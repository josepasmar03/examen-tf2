<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<title>TF II · Banco de preguntas — Segundo Parcial</title>
<style>
/* ============ TOKENS ============ */
:root{
  --step--1: clamp(.78rem,.74rem + .18vw,.88rem);
  --step-0: clamp(.95rem,.9rem + .25vw,1.08rem);
  --step-1: clamp(1.1rem,1rem + .55vw,1.4rem);
  --step-2: clamp(1.35rem,1.1rem + 1.1vw,2rem);
  --sp: clamp(.7rem,.5rem + 1.1vw,1.25rem);
  --r:16px; --r-sm:11px;
  --bg:#0f1117; --bg2:#0b0d12; --card:#171a23; --card2:#1f2330; --line:#2a2f3d;
  --txt:#e7e9f0; --mut:#9aa0b4;
  --brand:#6366f1; --brand2:#818cf8; --acc:#14b8a6;
  --ok:#22c55e; --okbg:rgba(34,197,94,.14); --bad:#ef4444; --badbg:rgba(239,68,68,.14);
  --warn:#f59e0b;
  --shadow:0 1px 2px rgba(0,0,0,.25),0 10px 30px rgba(0,0,0,.30);
  --navh:64px;
}
[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#eef1f7; --card:#ffffff; --card2:#f5f7fc; --line:#e1e6f0;
  --txt:#161a25; --mut:#5b6275;
  --brand:#4f46e5; --brand2:#6366f1; --acc:#0d9488;
  --ok:#15803d; --okbg:rgba(21,128,61,.12); --bad:#b91c1c; --badbg:rgba(185,28,28,.10);
  --shadow:0 1px 2px rgba(16,24,40,.06),0 10px 28px rgba(16,24,40,.10);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--txt);font-size:var(--step-0);line-height:1.55;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
  padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom));-webkit-tap-highlight-color:transparent}
h1,h2,h3{margin:0;line-height:1.2}
button{font-family:inherit;font-size:inherit;cursor:pointer}
.row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.mut{color:var(--mut)}
.sm{font-size:var(--step--1)}
.hide{display:none!important}

/* ============ HEADER ============ */
header{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--card) 88%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  padding:.6rem var(--sp);padding-top:max(.6rem,env(safe-area-inset-top))}
.brand{font-weight:800;font-size:var(--step-1);letter-spacing:-.02em;display:flex;align-items:center;gap:.5rem}
.brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--acc));
  display:grid;place-items:center;color:#fff;font-size:16px;flex:none}
.brand small{display:block;font-weight:500;font-size:var(--step--1);color:var(--mut)}
.iconbtn{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;
  min-width:40px;min-height:40px;display:grid;place-items:center;padding:0 .5rem}
.iconbtn:hover{border-color:var(--brand)}
.tabs{display:flex;gap:.4rem;margin-top:.6rem;flex-wrap:wrap}
.tab{padding:.5rem .9rem;border-radius:999px;background:var(--card2);color:var(--mut);border:1px solid transparent;
  font-weight:600;font-size:var(--step--1);display:flex;gap:.35rem;align-items:center}
.tab[aria-current="page"]{background:var(--brand);color:#fff;border-color:var(--brand)}
@media(max-width:720px){.tabs{display:none}}

/* ============ LAYOUT ============ */
main{max-width:860px;margin:0 auto;padding:var(--sp)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:var(--sp);
  margin-bottom:var(--sp);box-shadow:var(--shadow)}
.card.tight{padding:.8rem}

/* ============ FILTERS ============ */
.filterbar .row{gap:.5rem}
details.filters{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  margin-bottom:var(--sp);box-shadow:var(--shadow);overflow:hidden}
details.filters>summary{list-style:none;cursor:pointer;padding:.8rem var(--sp);font-weight:700;display:flex;align-items:center;gap:.5rem}
details.filters>summary::-webkit-details-marker{display:none}
details.filters>summary .chev{margin-left:auto;transition:transform .2s}
details.filters[open]>summary .chev{transform:rotate(180deg)}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(150px,100%),1fr));gap:.6rem;
  padding:0 var(--sp) var(--sp)}
.fgrid label{font-size:var(--step--1);color:var(--mut);display:block;margin-bottom:.25rem;font-weight:600}
select,input[type=text],input[type=number],textarea{width:100%;background:var(--card2);color:var(--txt);
  border:1px solid var(--line);border-radius:10px;padding:.55rem .65rem;font-size:var(--step-0);min-height:42px}
textarea{resize:vertical;min-height:64px;line-height:1.4}

/* ============ BUTTONS ============ */
.btn{background:var(--brand);color:#fff;border:none;padding:.6rem 1rem;border-radius:11px;font-weight:700;
  min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;transition:transform .12s,filter .2s}
.btn:hover{filter:brightness(1.08)} .btn:active{transform:scale(.97)}
.btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.btn.ok{background:var(--ok)} .btn.danger{background:var(--bad)} .btn.acc{background:var(--acc)}
.btn.sm{min-height:36px;padding:.4rem .7rem;font-size:var(--step--1);border-radius:9px}
.btn.block{width:100%}
.btn:disabled{opacity:.45}

/* ============ STUDY ============ */
.seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
.seg button{background:transparent;border:none;color:var(--mut);padding:.45rem .8rem;border-radius:8px;font-weight:700;font-size:var(--step--1);min-height:38px}
.seg button[aria-pressed="true"]{background:var(--brand);color:#fff}
.qmeta{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem}
.chip{font-size:var(--step--1);background:var(--card2);color:var(--mut);padding:.2rem .6rem;border-radius:999px;font-weight:600;border:1px solid var(--line)}
.chip.y{color:var(--brand2);border-color:color-mix(in srgb,var(--brand) 40%,var(--line))}
.chip.t{color:var(--acc)}
.chip.d-facil{color:var(--ok)} .chip.d-media{color:var(--warn)} .chip.d-dificil{color:var(--bad)}
.chip.inf{color:var(--warn);border:1px dashed var(--warn)}
.qtext{font-size:var(--step-1);font-weight:700;margin:.3rem 0 1rem;line-height:1.35}
.opts{display:grid;gap:.55rem}
.opt{display:flex;gap:.7rem;align-items:flex-start;width:100%;text-align:left;padding:.8rem .9rem;
  border:1.5px solid var(--line);border-radius:12px;background:var(--card2);color:var(--txt);font-size:var(--step-0);
  transition:border-color .15s,background .2s,transform .1s;min-height:48px}
.opt:hover{border-color:var(--brand)} .opt:active{transform:scale(.99)}
.opt .lt{font-weight:800;color:var(--mut);min-width:1.4em;flex:none}
.opt.correct{background:var(--okbg);border-color:var(--ok)} .opt.correct .lt{color:var(--ok)}
.opt.correct::after{content:"✓";margin-left:auto;color:var(--ok);font-weight:800;flex:none}
.opt.wrong{background:var(--badbg);border-color:var(--bad)} .opt.wrong .lt{color:var(--bad)}
.opt.wrong::after{content:"✗";margin-left:auto;color:var(--bad);font-weight:800;flex:none}
.opt.dim{opacity:.65}
.opt:disabled{cursor:default}
.grade{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-top:1rem}
.grade .g{border:1px solid var(--line);background:var(--card2);border-radius:11px;padding:.55rem .3rem;min-height:54px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;color:var(--txt);font-weight:700}
.grade .g small{font-weight:500;color:var(--mut);font-size:.7rem}
.grade .g.again{border-color:var(--bad)} .grade .g.again b{color:var(--bad)}
.grade .g.hard b{color:var(--warn)} .grade .g.good b{color:var(--brand2)} .grade .g.easy b{color:var(--ok)}
.bar{height:7px;background:var(--card2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--acc));transition:width .4s ease}
.note{padding:.6rem .8rem;border-radius:10px;font-size:var(--step--1);margin-bottom:.7rem;border:1px solid}
.note.warn{border-color:var(--warn);background:color-mix(in srgb,var(--warn) 10%,transparent)}
.note.bad{border-color:var(--bad);background:var(--badbg)}
.fix{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;margin-top:.8rem;padding-top:.8rem;border-top:1px dashed var(--line)}
.fix .pick{min-width:38px;min-height:38px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-weight:800}
.fix .pick.on{background:var(--ok);color:#fff;border-color:var(--ok)}

/* ============ RING ============ */
.ring{--p:0;width:clamp(78px,22vw,108px);aspect-ratio:1;border-radius:50%;position:relative;display:grid;place-items:center;flex:none;
  background:conic-gradient(var(--brand) calc(var(--p)*1%),var(--line) 0)}
.ring::before{content:"";position:absolute;inset:11px;border-radius:50%;background:var(--card)}
.ring b{position:relative;font-size:var(--step-1);font-weight:800}
.ring small{position:relative;display:block;text-align:center;color:var(--mut);font-size:.65rem;margin-top:-2px}

/* ============ STATS ============ */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(130px,45%),1fr));gap:.7rem}
.stat{background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:.9rem}
.stat b{font-size:var(--step-2);display:block;line-height:1.1} .stat span{color:var(--mut);font-size:var(--step--1)}
.heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(14px,1fr));gap:3px;margin-top:.5rem}
.heat i{aspect-ratio:1;border-radius:3px;background:var(--card2);border:1px solid var(--line)}
.heat i.l1{background:color-mix(in srgb,var(--acc) 30%,var(--card2))}
.heat i.l2{background:color-mix(in srgb,var(--acc) 55%,var(--card2))}
.heat i.l3{background:color-mix(in srgb,var(--acc) 80%,var(--card2))}
.heat i.l4{background:var(--acc)}
.tbars{display:grid;gap:.45rem;margin-top:.5rem}
.tbar{display:grid;grid-template-columns:minmax(110px,30%) 1fr auto;gap:.6rem;align-items:center;font-size:var(--step--1)}

/* ============ TABLE / BANK ============ */
table{width:100%;border-collapse:collapse;font-size:var(--step-0)}
thead th{position:sticky;top:0;text-align:left;color:var(--mut);font-size:var(--step--1);text-transform:uppercase;
  letter-spacing:.4px;padding:.6rem .5rem;border-bottom:1px solid var(--line);cursor:pointer;background:var(--card);white-space:nowrap}
tbody td{padding:.6rem .5rem;border-bottom:1px solid var(--line);vertical-align:top}
tr.q:hover{background:var(--card2)}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%}
.dot.ok{background:var(--ok)} .dot.no{background:var(--bad)}
.fav{color:var(--mut);font-size:1.1rem;line-height:1;background:none;border:none;padding:.2rem}
.fav.on{color:var(--warn)}
.bankq{cursor:pointer}
.expand{background:var(--card2)}
@media(max-width:640px){
  table,thead,tbody,tr,td{display:block}
  thead{position:absolute;left:-9999px}
  tr.q{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
    padding:.8rem;margin-bottom:.7rem}
  tbody td{border:none;padding:.2rem 0;display:grid;grid-template-columns:8.5em 1fr;gap:.5rem}
  tbody td::before{content:attr(data-label);font-weight:700;color:var(--mut);font-size:var(--step--1)}
  tr.expand{padding:0;background:none;border:none;box-shadow:none}
}

/* ============ BOTTOM NAV ============ */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:none;
  background:color-mix(in srgb,var(--card) 94%,transparent);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.bottomnav .inner{display:flex;max-width:860px;margin:0 auto}
.bottomnav button{flex:1;background:none;border:none;color:var(--mut);min-height:var(--navh);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:.66rem;font-weight:600}
.bottomnav button .ic{font-size:1.25rem;line-height:1}
.bottomnav button[aria-current="page"]{color:var(--brand)}
@media(max-width:720px){.bottomnav{display:block}}

/* ============ MODAL ============ */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:60;overflow:auto;padding:max(12px,env(safe-area-inset-top)) 12px 24px}
.modal.show{display:block}
.modal .inner{background:var(--card);border:1px solid var(--line);border-radius:var(--r);max-width:640px;margin:0 auto;padding:var(--sp);box-shadow:var(--shadow)}
.fld{margin-bottom:.7rem} .fld label{font-size:var(--step--1);color:var(--mut);font-weight:600;display:block;margin-bottom:.25rem}
.optedit{display:flex;gap:.5rem;align-items:center;margin-bottom:.45rem}
.optedit input[type=text]{flex:1}
.optedit input[type=radio]{width:20px;height:20px;flex:none}
.empty{text-align:center;color:var(--mut);padding:2rem 1rem}
.kbdhelp{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.4rem}
.kbd{font-family:ui-monospace,monospace;font-size:.7rem;background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:.1rem .4rem;color:var(--mut)}

:focus-visible{outline:3px solid var(--brand);outline-offset:2px;border-radius:8px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="row">
    <div class="brand"><span class="logo">℞</span><div>Tecnología Farmacéutica II<small id="subtitle">Banco · Segundo Parcial</small></div></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="btnTheme" title="Tema claro/oscuro">🌓</button>
    <button class="iconbtn" id="btnExport" title="Exportar copia">⬇</button>
    <button class="iconbtn" id="btnImport" title="Importar copia">⬆</button>
    <input type="file" id="fileImport" accept="application/json" class="hide">
  </div>
  <nav class="tabs" id="tabsTop" role="tablist"></nav>
</header>

<main>
  <details class="filters" id="filtersBox">
    <summary>⚙️ Filtros <span class="mut sm" id="count"></span><span class="chev">▾</span></summary>
    <div class="fgrid">
      <div><label>Año</label><select id="fYear"></select></div>
      <div><label>Convocatoria</label><select id="fConv"></select></div>
      <div><label>Examen</label><select id="fExam"></select></div>
      <div><label>Tema</label><select id="fTopic"></select></div>
      <div><label>Dificultad</label><select id="fDiff"></select></div>
      <div><label>Estado</label><select id="fState">
        <option value="">Todas</option>
        <option value="ans">Con respuesta</option>
        <option value="noans">Sin respuesta marcada</option>
        <option value="fav">⭐ Favoritas</option>
        <option value="due">⏰ Toca repasar</option>
        <option value="wrong">❌ Falladas</option>
        <option value="new">🆕 Sin practicar</option>
      </select></div>
      <div style="grid-column:1/-1"><label>Buscar</label><input type="text" id="fSearch" placeholder="palabra clave en enunciado u opciones…"></div>
      <div style="grid-column:1/-1"><button class="btn ghost sm" id="btnClear">Limpiar filtros</button></div>
    </div>
  </details>
  <div id="view"></div>
</main>

<nav class="bottomnav"><div class="inner" id="tabsBottom"></div></nav>

<!-- MODAL EDICION -->
<div class="modal" id="modal"><div class="inner">
  <h3 id="mTitle">Editar pregunta</h3>
  <div class="fld"><label>Enunciado</label><textarea id="mText"></textarea></div>
  <div class="fld"><label>Opciones (marca el círculo de la correcta)</label><div id="mOpts"></div>
    <button class="btn ghost sm" id="mAddOpt">+ opción</button></div>
  <div class="fld"><label>Explicación (opcional, se muestra al corregir)</label><textarea id="mExpl" placeholder="por qué es correcta…"></textarea></div>
  <div class="fgrid" style="padding:0">
    <div><label>Año</label><input type="number" id="mYear" placeholder="—"></div>
    <div><label>Mes</label><input type="number" id="mMonth" min="1" max="12" placeholder="—"></div>
    <div><label>Convocatoria</label><input type="text" id="mConv"></div>
    <div><label>Dificultad</label><select id="mDiff"><option value="facil">fácil</option><option value="media">media</option><option value="dificil">difícil</option></select></div>
    <div style="grid-column:1/-1"><label>Examen</label><input type="text" id="mExam"></div>
    <div style="grid-column:1/-1"><label>Tema</label><input type="text" id="mTopic"></div>
  </div>
  <div class="row" style="margin-top:1rem">
    <button class="btn ok" id="mSave">Guardar</button>
    <button class="btn ghost" id="mCancel">Cancelar</button>
    <div class="spacer"></div>
    <button class="btn danger sm" id="mDelete">Eliminar</button>
  </div>
  <p class="mut sm" style="margin:.6rem 0 0">Se guarda en este navegador. Usa ⬇ para respaldar.</p>
</div></div>

<script>
/* ===================== ESTADO ===================== */
const LS='tf2_v4';
const BASE=(window.QUESTIONS||[]).map(q=>({...q,options:q.options.map(o=>({...o}))}));
let store=load();
function load(){try{const s=JSON.parse(localStorage.getItem(LS));if(s&&s.v===4)return s;}catch(e){}return def();}
function def(){return{v:4,edits:{},added:[],deleted:[],progress:{},history:{},nextId:90000,settings:{theme:''}};}
let saveT;function save(){clearTimeout(saveT);saveT=setTimeout(()=>localStorage.setItem(LS,JSON.stringify(store)),120);}

/* ===================== MODELO ===================== */
function allQuestions(){
  const out=[];
  for(const q of BASE){if(!store.deleted.includes(q.id))out.push(applyEdit(q));}
  for(const q of store.added){if(!store.deleted.includes(q.id))out.push(applyEdit(q));}
  return out;
}
function applyEdit(q){const e=store.edits[q.id];const m=e?{...q,...e}:{...q};
  m.options=(e&&e.options?e.options:q.options).map(o=>({...o}));return m;}
function prog(id){return store.progress[id]||(store.progress[id]={ease:2.5,interval:0,due:0,reps:0,lapses:0,state:'new',step:0,seen:0,ok:0,ko:0,fav:false});}
function isDue(id){const p=store.progress[id];return !p||!p.due||p.due<=Date.now();}
function isNew(id){const p=store.progress[id];return !p||!p.seen;}

/* ===================== SM-2 (estilo Anki) ===================== */
const DAY=86400000, MIN=60000;
function schedule(id,rating){ // 1 Again, 2 Hard, 3 Good, 4 Easy
  const p=prog(id),now=Date.now();p.seen++;p.reps++;if(!p.ease)p.ease=2.5;
  if(rating===1)p.ko++;else p.ok++;
  if(p.state!=='review'){
    if(rating===1){p.state='learning';p.step=0;p.due=now+MIN;}
    else if(rating===2){p.state='learning';p.due=now+6*MIN;}
    else if(rating===3){if((p.step||0)>=1){p.state='review';p.interval=1;p.due=now+DAY;}else{p.state='learning';p.step=1;p.due=now+10*MIN;}}
    else{p.state='review';p.interval=4;p.ease+=0.15;p.due=now+4*DAY;}
  }else{
    if(rating===1){p.lapses++;p.ease-=0.20;p.state='learning';p.step=0;p.interval=0;p.due=now+10*MIN;}
    else if(rating===2){p.ease-=0.15;p.interval=Math.max(1,Math.round((p.interval||1)*1.2));p.due=now+p.interval*DAY;}
    else if(rating===3){p.interval=Math.max(1,Math.round((p.interval||1)*p.ease));p.due=now+p.interval*DAY;}
    else{p.ease+=0.15;p.interval=Math.max(1,Math.round((p.interval||1)*p.ease*1.3));p.due=now+p.interval*DAY;}
  }
  p.ease=Math.max(1.3,Math.min(3.0,p.ease));
  const d=todayKey();store.history[d]=(store.history[d]||0)+1;
  save();
}
function dueLabel(id,rating){ // texto previsto para el botón
  const p=store.progress[id]||{ease:2.5,interval:0,state:'new',step:0};
  const e=p.ease||2.5;
  if(p.state!=='review'){
    if(rating===1)return '1 min';if(rating===2)return '6 min';
    if(rating===3)return (p.step>=1)?'1 día':'10 min';return '4 días';
  }
  let iv;if(rating===1)iv='10 min';
  else if(rating===2)iv=fmtD(Math.max(1,Math.round((p.interval||1)*1.2)));
  else if(rating===3)iv=fmtD(Math.max(1,Math.round((p.interval||1)*e)));
  else iv=fmtD(Math.max(1,Math.round((p.interval||1)*e*1.3)));
  return iv;
}
function fmtD(d){return d>=30?(Math.round(d/30)+' mes'+(d>=60?'es':'')):d+' día'+(d>1?'s':'');}
function todayKey(d){d=d||new Date();return d.toISOString().slice(0,10);}

/* ===================== UTIL ===================== */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function na(s){return (s||'').normalize('NFKD').replace(/[̀-ͯ]/g,'').toLowerCase();}
function uniq(a){return [...new Set(a)];}
const MONTHS=['','enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

/* ===================== FILTROS ===================== */
function val(id){return document.getElementById(id).value;}
function getF(){return{year:val('fYear'),conv:val('fConv'),exam:val('fExam'),diff:val('fDiff'),topic:val('fTopic'),state:val('fState'),q:na(val('fSearch'))};}
function filtered(){const f=getF();return allQuestions().filter(x=>{
  if(f.year&&String(x.year||'')!==f.year)return false;
  if(f.conv&&(x.conv||'')!==f.conv)return false;
  if(f.exam&&x.exam!==f.exam)return false;
  if(f.diff&&(x.difficulty||'media')!==f.diff)return false;
  if(f.topic&&(x.topic||'')!==f.topic)return false;
  const p=store.progress[x.id];
  if(f.state==='ans'&&!(x.correct&&x.correct.length))return false;
  if(f.state==='noans'&&(x.correct&&x.correct.length))return false;
  if(f.state==='fav'&&!(p&&p.fav))return false;
  if(f.state==='due'&&!isDue(x.id))return false;
  if(f.state==='wrong'&&!(p&&p.ko>p.ok))return false;
  if(f.state==='new'&&!isNew(x.id))return false;
  if(f.q){const h=na(x.text+' '+x.options.map(o=>o.t).join(' '));if(!h.includes(f.q))return false;}
  return true;
});}
function fillFilters(){const qs=allQuestions();
  selOpts('fYear','Todos',uniq(qs.map(q=>q.year).filter(Boolean)).sort());
  selOpts('fConv','Todas',uniq(qs.map(q=>q.conv).filter(Boolean)).sort());
  selOpts('fExam','Todos',uniq(qs.map(q=>q.exam)).sort());
  selOpts('fTopic','Todos',uniq(qs.map(q=>q.topic).filter(Boolean)).sort());
  selOpts('fDiff','Todas',['facil','media','dificil']);
}
function selOpts(id,all,items){const s=document.getElementById(id);const cur=s.value;
  s.innerHTML='<option value="">'+all+'</option>'+items.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
  if([...s.options].some(o=>o.value===cur))s.value=cur;}

/* ===================== NAV ===================== */
const TABS=[{id:'estudiar',ic:'🎯',t:'Estudiar'},{id:'examen',ic:'📝',t:'Examen'},{id:'banco',ic:'📚',t:'Banco'},{id:'stats',ic:'📊',t:'Progreso'}];
let TAB='estudiar';
function renderNav(){
  document.getElementById('tabsTop').innerHTML=TABS.map(t=>`<button class="tab" role="tab" data-tab="${t.id}" aria-current="${TAB===t.id?'page':'false'}">${t.ic} ${t.t}</button>`).join('');
  document.getElementById('tabsBottom').innerHTML=TABS.map(t=>`<button data-tab="${t.id}" aria-current="${TAB===t.id?'page':'false'}"><span class="ic">${t.ic}</span>${t.t}</button>`).join('');
}
function go(tab){TAB=tab;sess=null;exam=null;renderNav();render();window.scrollTo(0,0);}
document.body.addEventListener('click',e=>{const b=e.target.closest('[data-tab]');if(b)go(b.dataset.tab);});

/* ===================== RENDER ===================== */
function render(){
  document.getElementById('count').textContent='· '+filtered().length+' preguntas';
  const v=document.getElementById('view');
  if(TAB==='estudiar')renderStudy(v);
  else if(TAB==='examen')renderExam(v);
  else if(TAB==='banco')renderBank(v);
  else renderStats(v);
}

/* ===================== ESTUDIAR (Test / Flashcard + SRS) ===================== */
let sess=null; // {mode:'test'|'card', srsOnly:bool, queue:[], i, revealed, chosen}
function studyPool(srsOnly){let p=filtered();if(srsOnly)p=p.filter(q=>isDue(q.id));
  // nuevas primero entre las vencidas, luego por due
  return shuffle(p).sort((a,b)=>(isNew(a.id)?0:1)-(isNew(b.id)?0:1));}
function startStudy(mode,srsOnly){sess={mode,srsOnly,queue:studyPool(srsOnly),i:0,revealed:false,chosen:null};render();}
function renderStudy(v){
  if(!sess){
    const due=filtered().filter(q=>isDue(q.id)).length;
    v.innerHTML=`<div class="card">
      <h2 style="margin-bottom:.4rem">🎯 Estudiar</h2>
      <p class="mut sm">Usa los filtros para elegir qué entra. Disponibles ahora: <b>${filtered().length}</b> · tocan repasar: <b>${due}</b>.</p>
      <div class="row" style="margin:.8rem 0">
        <span class="sm mut">Modo:</span>
        <div class="seg" id="modeSeg">
          <button data-m="test" aria-pressed="true">📝 Test</button>
          <button data-m="card" aria-pressed="false">🃏 Flashcards</button>
        </div>
      </div>
      <label class="row sm" style="margin-bottom:1rem;gap:.4rem"><input type="checkbox" id="srsOnly" style="width:20px;height:20px"> Solo las que tocan repasar hoy (repaso espaciado)</label>
      <button class="btn block" id="startBtn">▶ Empezar</button>
      <div class="kbdhelp"><span class="kbd">a-e</span> elegir <span class="kbd">␣</span> revelar/siguiente <span class="kbd">1-4</span> calificar <span class="kbd">f</span> favorita</div>
    </div>`;
    let mode='test';
    v.querySelector('#modeSeg').addEventListener('click',e=>{const b=e.target.closest('[data-m]');if(!b)return;mode=b.dataset.m;
      v.querySelectorAll('#modeSeg button').forEach(x=>x.setAttribute('aria-pressed',x===b));});
    v.querySelector('#startBtn').onclick=()=>startStudy(mode,v.querySelector('#srsOnly').checked);
    return;
  }
  if(sess.i>=sess.queue.length){
    const done=sess.queue.length;
    v.innerHTML=`<div class="card" style="text-align:center">
      <div style="font-size:2.5rem">🎉</div><h2>¡Sesión completa!</h2>
      <p class="mut">Has repasado ${done} pregunta${done!==1?'s':''}.</p>
      <button class="btn" onclick="sess=null;render()">Volver</button></div>`;
    return;
  }
  const q=sess.queue[sess.i];const p=prog(q.id);
  const opts=sess._opts||(sess._opts=shuffle(q.options));
  const hasAns=q.correct&&q.correct.length;
  const pct=Math.round(sess.i/sess.queue.length*100);
  let optsHtml=opts.map(o=>{
    let cls='opt';
    if(sess.revealed){
      if(q.correct.includes(o.l))cls+=' correct';
      else if(sess.chosen===o.l)cls+=' wrong';
      else cls+=' dim';
    }
    return `<button class="${cls}" ${sess.revealed?'disabled':''} data-l="${o.l}" onclick="pick('${o.l}')"><span class="lt">${o.l})</span><span>${esc(o.t)}</span></button>`;
  }).join('');
  if(sess.mode==='card'&&!sess.revealed)optsHtml=`<button class="btn block acc" onclick="reveal()">👁 Mostrar respuesta</button>`;

  v.innerHTML=`<div class="card">
    <div class="row sm mut" style="margin-bottom:.5rem"><span>Pregunta ${sess.i+1} / ${sess.queue.length}</span>
      <span class="spacer"></span>${isNew(q.id)?'<span class="chip">🆕 nueva</span>':isDue(q.id)?'<span class="chip">⏰ repaso</span>':''}
      <button class="fav ${p.fav?'on':''}" onclick="toggleFav(${q.id})" title="favorita (f)">★</button></div>
    <div class="bar" style="margin-bottom:.8rem"><i style="width:${pct}%"></i></div>
    ${metaChips(q)}
    <div class="qtext">${esc(q.text)}</div>
    ${hasAns?'':'<div class="note bad">⚠ Sin respuesta marcada en el PDF. Márcala abajo o edítala.</div>'}
    <div class="opts" id="opts">${optsHtml}</div>
    <div id="after"></div>
  </div>`;
  if(sess.revealed)renderAfter(q);
}
function pick(l){const q=sess.queue[sess.i];if(!q.correct.length){return;}sess.chosen=l;sess.revealed=true;renderStudy(document.getElementById('view'));}
function reveal(){sess.revealed=true;sess.chosen=null;renderStudy(document.getElementById('view'));}
function renderAfter(q){
  const after=document.getElementById('after');
  const expl=q.expl?`<div class="note warn" style="margin-top:.8rem">💡 ${esc(q.expl)}</div>`:'';
  let grade='';
  if(q.correct.length){
    grade=`<div class="grade">
      <button class="g again" onclick="grade(1)"><b>Otra vez</b><small>${dueLabel(q.id,1)}</small></button>
      <button class="g hard" onclick="grade(2)"><b>Difícil</b><small>${dueLabel(q.id,2)}</small></button>
      <button class="g good" onclick="grade(3)"><b>Bien</b><small>${dueLabel(q.id,3)}</small></button>
      <button class="g easy" onclick="grade(4)"><b>Fácil</b><small>${dueLabel(q.id,4)}</small></button></div>`;
  }else{
    grade=`<button class="btn block" style="margin-top:.8rem" onclick="next()">Siguiente ▶</button>`;
  }
  after.innerHTML=expl+grade+`<div class="fix">
    <span class="sm mut">¿Respuesta correcta?</span>
    ${q.options.map(o=>`<button class="pick ${q.correct.includes(o.l)?'on':''}" onclick="setCorrect(${q.id},'${o.l}')" title="marcar ${o.l} como correcta">${o.l}</button>`).join('')}
    <button class="btn ghost sm" onclick="openEdit(${q.id})">✎ Editar</button></div>`;
}
function grade(r){const q=sess.queue[sess.i];schedule(q.id,r);next();}
function next(){sess.i++;sess.revealed=false;sess.chosen=null;sess._opts=null;render();}
function toggleFav(id){const p=prog(id);p.fav=!p.fav;save();render();}
function setCorrect(id,l){const cur=allQuestions().find(x=>x.id===id);
  store.edits[id]={...(store.edits[id]||{}),correct:[l],inferred:false,options:cur.options};
  save();if(sess){sess.queue[sess.i]=applyEdit(BASE.find(b=>b.id===id)||store.added.find(a=>a.id===id));}render();}

/* ===================== EXAMEN ===================== */
let exam=null; // {qs:[], ans:{}, done, start, timer}
function renderExam(v){
  if(!exam){
    const pool=filtered().filter(q=>q.correct&&q.correct.length);
    v.innerHTML=`<div class="card"><h2>📝 Simulacro de examen</h2>
      <p class="mut sm">Preguntas al azar (solo con respuesta marcada): <b>${pool.length}</b> disponibles tras los filtros.</p>
      <div class="row" style="margin:.8rem 0"><label class="sm mut">Nº preguntas</label>
        <select id="examN" style="width:auto"><option>10</option><option>20</option><option selected>40</option><option>70</option></select>
        <label class="row sm" style="gap:.3rem"><input type="checkbox" id="examTimed" checked style="width:18px;height:18px"> con tiempo</label>
      </div>
      <button class="btn block" onclick="genExam()">▶ Generar examen</button></div>`;
    return;
  }
  if(!exam.done){
    v.innerHTML=`<div class="card tight row"><b>Simulacro · ${exam.qs.length}p</b><span class="spacer"></span>
      <span class="mut sm" id="examTimer"></span><button class="btn ok sm" onclick="correctExam()">Corregir ✓</button></div>`+
      exam.qs.map((q,i)=>`<div class="card">${metaChips(q)}<div class="qtext">${i+1}. ${esc(q.text)}</div>
        <div class="opts">${q._opts.map(o=>`<button class="opt" style="${exam.ans[q.id]===o.l?'border-color:var(--brand);background:color-mix(in srgb,var(--brand) 12%,transparent)':''}" onclick="examPick(${q.id},'${o.l}',this)"><span class="lt">${o.l})</span><span>${esc(o.t)}</span></button>`).join('')}</div></div>`).join('')+
      `<div class="card"><button class="btn block ok" onclick="correctExam()">Corregir ✓</button></div>`;
    if(exam.timed)tick();
    return;
  }
  let ok=0;const body=exam.qs.map((q,i)=>{const sel=exam.ans[q.id];if(q.correct.includes(sel))ok++;
    return `<div class="card">${metaChips(q)}<div class="qtext">${i+1}. ${esc(q.text)}</div>
      <div class="opts">${q._opts.map(o=>{let c='opt dim';if(q.correct.includes(o.l))c='opt correct';else if(sel===o.l)c='opt wrong';
        return `<button class="${c}" disabled><span class="lt">${o.l})</span><span>${esc(o.t)}</span></button>`;}).join('')}</div>
      ${sel?'':'<p class="mut sm">— sin responder —</p>'}
      ${q.expl?`<div class="note warn" style="margin-top:.6rem">💡 ${esc(q.expl)}</div>`:''}
      <div class="fix"><button class="btn ghost sm" onclick="openEdit(${q.id})">✎ Editar</button></div></div>`;}).join('');
  const pct=Math.round(ok/exam.qs.length*100);
  v.innerHTML=`<div class="card" style="text-align:center">
      <div class="ring" style="--p:${pct};margin:0 auto .6rem"><b>${pct}%</b><small>nota</small></div>
      <h2>${ok}/${exam.qs.length} correctas</h2>
      <button class="btn" onclick="exam=null;render()">Nuevo examen</button></div>`+body;
}
function genExam(){const n=+val('examN');const timed=document.getElementById('examTimed').checked;
  const pool=shuffle(filtered().filter(q=>q.correct&&q.correct.length)).slice(0,n).map(q=>({...q,_opts:shuffle(q.options)}));
  exam={qs:pool,ans:{},done:false,start:Date.now(),timed};render();}
function examPick(id,l,el){exam.ans[id]=l;[...el.parentNode.children].forEach(o=>{o.style.borderColor='';o.style.background='';});
  el.style.borderColor='var(--brand)';el.style.background='color-mix(in srgb,var(--brand) 12%,transparent)';}
function correctExam(){exam.done=true;exam.qs.forEach(q=>schedule(q.id,q.correct.includes(exam.ans[q.id])?3:1));render();window.scrollTo(0,0);}
function tick(){if(!exam||exam.done)return;const t=document.getElementById('examTimer');if(!t)return;
  const s=(Date.now()-exam.start)/1000|0;t.textContent='⏱ '+String(s/60|0).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  setTimeout(tick,1000);}

/* ===================== BANCO ===================== */
let sortK='id',sortD=1,openRow=null;
function renderBank(v){
  let qs=filtered().slice().sort((a,b)=>{let x=a[sortK]??'',y=b[sortK]??'';return (x>y?1:x<y?-1:0)*sortD;});
  v.innerHTML=`<div class="card tight row"><button class="btn ok sm" onclick="openEdit('new')">+ Nueva pregunta</button>
    <span class="spacer"></span><span class="mut sm">${qs.length} resultados</span></div>
    <div class="card" style="padding:.4rem;overflow:auto">
    <table><thead><tr>
      <th onclick="setSort('year')">Año</th><th onclick="setSort('topic')">Tema</th>
      <th onclick="setSort('num')">Nº</th><th>Pregunta</th><th onclick="setSort('difficulty')">Dif.</th>
      <th>✓</th><th>★</th></tr></thead>
    <tbody>${qs.map(rowHtml).join('')}</tbody></table></div>`;
}
function rowHtml(q){const p=store.progress[q.id]||{};const ans=q.correct&&q.correct.length;
  return `<tr class="q bankq" onclick="expand(${q.id})">
    <td data-label="Año"><span class="chip y">${q.year||'s/f'}</span></td>
    <td data-label="Tema"><span class="chip t">${esc(q.topic||'—')}</span></td>
    <td data-label="Nº">${q.num||''}</td>
    <td data-label="Pregunta">${esc(q.text.slice(0,110))}${q.text.length>110?'…':''} ${q.inferred?'<span class="chip inf">inferida</span>':''}</td>
    <td data-label="Dif."><span class="chip d-${q.difficulty||'media'}">${q.difficulty||'media'}</span></td>
    <td data-label="Resp."><span class="dot ${ans?'ok':'no'}"></span></td>
    <td data-label="Fav"><button class="fav ${p.fav?'on':''}" onclick="event.stopPropagation();toggleFav(${q.id})">★</button></td>
  </tr>${openRow===q.id?`<tr class="expand"><td colspan="7">${cardFull(q)}</td></tr>`:''}`;
}
function cardFull(q){return `<div class="card" style="margin:.4rem 0">${metaChips(q)}<div class="qtext">${esc(q.text)}</div>
  <div class="opts">${q.options.map(o=>`<div class="opt ${q.correct.includes(o.l)?'correct':''}" style="cursor:default"><span class="lt">${o.l})</span><span>${esc(o.t)}</span></div>`).join('')}</div>
  ${q.expl?`<div class="note warn" style="margin-top:.6rem">💡 ${esc(q.expl)}</div>`:''}
  <div class="fix"><button class="btn ghost sm" onclick="event.stopPropagation();openEdit(${q.id})">✎ Editar</button>
   <span class="sm mut">Correcta:</span>${q.options.map(o=>`<button class="pick ${q.correct.includes(o.l)?'on':''}" onclick="event.stopPropagation();setCorrectBank(${q.id},'${o.l}')">${o.l}</button>`).join('')}</div></div>`;}
function setCorrectBank(id,l){const cur=allQuestions().find(x=>x.id===id);store.edits[id]={...(store.edits[id]||{}),correct:[l],inferred:false,options:cur.options};save();render();}
function expand(id){openRow=openRow===id?null:id;render();}
function setSort(k){if(sortK===k)sortD*=-1;else{sortK=k;sortD=1;}render();}

/* ===================== PROGRESO ===================== */
function renderStats(v){
  const qs=allQuestions();
  const ans=qs.filter(q=>q.correct&&q.correct.length).length;
  const seen=qs.filter(q=>!isNew(q.id)).length;
  const due=qs.filter(q=>isDue(q.id)&&!isNew(q.id)).length;
  const mastered=qs.filter(q=>{const p=store.progress[q.id];return p&&p.state==='review'&&p.interval>=21;}).length;
  let tok=0,tko=0;Object.values(store.progress).forEach(p=>{tok+=p.ok||0;tko+=p.ko||0;});
  const acc=tok+tko?Math.round(tok/(tok+tko)*100):0;
  const streak=calcStreak();
  // por tema
  const byT={};qs.forEach(q=>{const k=q.topic||'—';const o=byT[k]||(byT[k]={n:0,ok:0,ko:0});o.n++;const p=store.progress[q.id];if(p){o.ok+=p.ok||0;o.ko+=p.ko||0;}});
  const tbars=Object.entries(byT).sort((a,b)=>b[1].n-a[1].n).map(([k,o])=>{const t=o.ok+o.ko;const a=t?Math.round(o.ok/t*100):0;
    return `<div class="tbar"><span>${esc(k)}</span><div class="bar"><i style="width:${a}%"></i></div><span class="mut">${t?a+'%':'·'} (${o.n})</span></div>`;}).join('');
  v.innerHTML=`<div class="card">
      <div class="row" style="gap:var(--sp);align-items:center">
        <div class="ring" style="--p:${seen?Math.round(seen/qs.length*100):0}"><b>${seen}</b><small>vistas/${qs.length}</small></div>
        <div class="stats" style="flex:1">
          <div class="stat"><b>${acc}%</b><span>acierto global</span></div>
          <div class="stat"><b>🔥 ${streak}</b><span>racha (días)</span></div>
          <div class="stat"><b>${due}</b><span>tocan repasar</span></div>
          <div class="stat"><b>${mastered}</b><span>dominadas</span></div>
        </div>
      </div></div>
    <div class="card"><h3>Actividad (últimas 18 semanas)</h3>${heatmap()}</div>
    <div class="card"><h3>Acierto por tema</h3><div class="tbars">${tbars}</div></div>
    <div class="card"><h3>Resumen del banco</h3>
      <p class="mut sm">${qs.length} preguntas · ${ans} con respuesta marcada · ${qs.length-ans} sin marcar.</p>
      <div class="row"><button class="btn danger sm" onclick="resetProg()">Reiniciar progreso</button>
        <button class="btn danger sm" onclick="resetAll()">Borrar todo</button></div></div>`;
}
function calcStreak(){let s=0;const d=new Date();for(;;){const k=todayKey(d);if(store.history[k]){s++;d.setDate(d.getDate()-1);}else{if(s===0&&k===todayKey())break;else break;}}
  // contar hacia atrás de forma robusta
  s=0;let cur=new Date();while(store.history[todayKey(cur)]){s++;cur.setDate(cur.getDate()-1);}return s;}
function heatmap(){const days=18*7;const arr=[];const d=new Date();d.setDate(d.getDate()-(days-1));
  let max=1;Object.values(store.history).forEach(v=>max=Math.max(max,v));
  for(let i=0;i<days;i++){const k=todayKey(d);const c=store.history[k]||0;const l=c?(c>=max*0.75?4:c>=max*0.5?3:c>=max*0.25?2:1):0;
    arr.push(`<i class="${l?'l'+l:''}" title="${k}: ${c}"></i>`);d.setDate(d.getDate()+1);}
  return `<div class="heat">${arr.join('')}</div>`;}
function resetProg(){if(confirm('¿Reiniciar tu progreso de estudio (SRS, racha, estadísticas)?')){store.progress={};store.history={};save();render();}}
function resetAll(){if(confirm('¿Borrar TODO: ediciones, preguntas añadidas y progreso? Los datos del PDF se mantienen.')){store=def();save();fillFilters();render();}}

/* ===================== CHIPS ===================== */
function metaChips(q){return `<div class="qmeta">
  <span class="chip y">${q.year||'s/f'}</span>
  ${q.conv?`<span class="chip">${esc(q.conv)}</span>`:''}
  ${q.month?`<span class="chip">${MONTHS[q.month]||q.month}</span>`:''}
  ${q.topic?`<span class="chip t">${esc(q.topic)}</span>`:''}
  <span class="chip d-${q.difficulty||'media'}">${q.difficulty||'media'}</span>
  ${q.inferred?'<span class="chip inf">resp. inferida</span>':''}</div>`;}

/* ===================== EDICION ===================== */
let editId=null;
function openEdit(id){editId=id;const isNew=id==='new';
  const q=isNew?{text:'',options:[{l:'a',t:''},{l:'b',t:''},{l:'c',t:''},{l:'d',t:''},{l:'e',t:''}],correct:[],difficulty:'media',exam:'Personalizada',conv:'',year:'',month:'',topic:'General',expl:''}:allQuestions().find(x=>x.id===id);
  document.getElementById('mTitle').textContent=isNew?'Nueva pregunta':'Editar #'+(q.num||q.id);
  document.getElementById('mText').value=q.text;
  document.getElementById('mExpl').value=q.expl||'';
  document.getElementById('mYear').value=q.year||'';document.getElementById('mMonth').value=q.month||'';
  document.getElementById('mConv').value=q.conv||'';document.getElementById('mExam').value=q.exam||'';
  document.getElementById('mDiff').value=q.difficulty||'media';document.getElementById('mTopic').value=q.topic||'';
  document.getElementById('mDelete').style.display=isNew?'none':'';
  mOpts(q.options,q.correct);
  document.getElementById('modal').classList.add('show');
}
function mOpts(opts,correct){document.getElementById('mOpts').innerHTML=opts.map((o,i)=>`<div class="optedit">
  <input type="radio" name="corr" value="${i}" ${correct.includes(o.l)?'checked':''} title="correcta">
  <b style="width:1.3em">${o.l})</b><input type="text" class="oTxt" data-l="${o.l}" value="${esc(o.t)}">
  <button class="btn ghost sm" onclick="this.closest('.optedit').remove()">✕</button></div>`).join('');}
document.getElementById('mAddOpt').onclick=()=>{const c=document.getElementById('mOpts');const L='abcdefghij'[c.children.length]||'x';
  const d=document.createElement('div');d.className='optedit';
  d.innerHTML=`<input type="radio" name="corr" value="${c.children.length}"><b style="width:1.3em">${L})</b><input type="text" class="oTxt" data-l="${L}" value=""><button class="btn ghost sm" onclick="this.closest('.optedit').remove()">✕</button>`;
  c.appendChild(d);};
document.getElementById('mSave').onclick=()=>{
  const opts=[...document.querySelectorAll('#mOpts .oTxt')].map(i=>({l:i.dataset.l,t:i.value.trim()})).filter(o=>o.t);
  const sel=document.querySelector('#mOpts input[name=corr]:checked');
  const correct=sel&&opts[+sel.value]?[opts[+sel.value].l]:[];
  const data={text:document.getElementById('mText').value.trim(),options:opts,correct,expl:document.getElementById('mExpl').value.trim(),
    year:+document.getElementById('mYear').value||null,month:+document.getElementById('mMonth').value||null,
    conv:document.getElementById('mConv').value.trim(),exam:document.getElementById('mExam').value.trim()||'Personalizada',
    difficulty:document.getElementById('mDiff').value,topic:document.getElementById('mTopic').value.trim()||'General',inferred:false};
  if(editId==='new'){data.id=store.nextId++;data.num='+';store.added.push(data);}
  else store.edits[editId]={...(store.edits[editId]||{}),...data};
  save();closeModal();fillFilters();if(sess)sess._opts=null;render();
};
document.getElementById('mDelete').onclick=()=>{if(confirm('¿Eliminar esta pregunta?')){store.deleted.push(editId);if(store.added.find(a=>a.id===editId))store.added=store.added.filter(a=>a.id!==editId);save();closeModal();fillFilters();render();}};
document.getElementById('mCancel').onclick=closeModal;
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};

/* ===================== EXPORT / IMPORT ===================== */
document.getElementById('btnExport').onclick=()=>{const data={app:'TF2',v:4,date:new Date().toISOString(),store};
  const b=new Blob([JSON.stringify(data)],{type:'application/json'});const a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='copia_banco_tf2.json';a.click();};
document.getElementById('btnImport').onclick=()=>document.getElementById('fileImport').click();
document.getElementById('fileImport').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(d.store){store=d.store;save();fillFilters();render();alert('Copia importada.');}
    else if(d.questions){alert('Formato antiguo importado parcialmente.');}}catch(e){alert('Archivo no válido');}};r.readAsText(f);};

/* ===================== TECLADO ===================== */
document.addEventListener('keydown',e=>{
  if(document.getElementById('modal').classList.contains('show'))return;
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  if(TAB!=='estudiar'||!sess||sess.i>=sess.queue.length)return;
  const q=sess.queue[sess.i];const k=e.key.toLowerCase();
  if(!sess.revealed){
    if('abcde'.includes(k)&&q.options.some(o=>o.l===k)){pick(k);e.preventDefault();}
    else if(k===' '&&sess.mode==='card'){reveal();e.preventDefault();}
  }else{
    if(['1','2','3','4'].includes(k)&&q.correct.length){grade(+k);e.preventDefault();}
    else if((k===' '||k==='enter')){if(q.correct.length)grade(3);else next();e.preventDefault();}
  }
  if(k==='f'){toggleFav(q.id);e.preventDefault();}
});

/* ===================== EVENTOS FILTROS ===================== */
['fYear','fConv','fExam','fTopic','fDiff','fState'].forEach(id=>document.getElementById(id).onchange=()=>{sess=null;exam=null;render();});
document.getElementById('fSearch').oninput=()=>{if(TAB==='banco')render();else document.getElementById('count').textContent='· '+filtered().length+' preguntas';};
document.getElementById('btnClear').onclick=()=>{['fYear','fConv','fExam','fTopic','fDiff','fState','fSearch'].forEach(id=>document.getElementById(id).value='');sess=null;exam=null;render();};
document.getElementById('btnTheme').onclick=()=>{const cur=document.documentElement.getAttribute('data-theme');
  const t=cur==='light'?'dark':cur==='dark'?'':'light';
  if(t)document.documentElement.setAttribute('data-theme',t);else document.documentElement.removeAttribute('data-theme');
  store.settings.theme=t;save();};

/* ===================== INIT ===================== */
if(store.settings.theme)document.documentElement.setAttribute('data-theme',store.settings.theme);
fillFilters();renderNav();render();
</script>
</body>
</html>
